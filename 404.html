<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found | The Coaching Collective Online</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',sans-serif;background:#080f09;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.wrap{max-width:480px;}
.code{font-family:'Playfair Display',serif;font-size:clamp(6rem,20vw,10rem);font-weight:300;color:rgba(105,174,122,0.25);line-height:1;margin-bottom:0.5rem;}
h1{font-family:'Playfair Display',serif;font-weight:300;font-size:clamp(1.4rem,4vw,2rem);color:#f7f5e3;margin-bottom:1rem;}
p{font-size:1rem;color:rgba(247,245,227,0.6);line-height:1.7;margin-bottom:2.5rem;}
.btn-group{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-block;padding:0.75rem 2rem;border-radius:4px;font-size:0.9rem;letter-spacing:0.04em;text-decoration:none;transition:all 0.25s ease;font-family:'Outfit',sans-serif;}
.btn-primary{background:#1b5323;color:#f7f5e3;border:1px solid #1b5323;}
.btn-primary:hover{background:#377e49;}
.btn-ghost{background:transparent;color:#f7f5e3;border:1px solid rgba(247,245,227,0.3);}
.btn-ghost:hover{border-color:#f7f5e3;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for has moved, or may never have existed.<br>Let's get you back on track.</p>
    <div class="btn-group">
      <a href="/" class="btn btn-primary">Back to home</a>
      <a href="/pages/pages/contact-stl.html" class="btn btn-ghost">Contact us</a>
    </div>
  </div>
</body>
</html>
